name: Claude Auto-Review

# Auto-reviews PRs the agent opens (head branch `claude/*`) with the official
# code-review plugin: it posts findings as comments and NEVER blocks the merge
# (you stay the merge gate). Scoped to `claude/*` branches to target AI-generated
# code and keep subscription-quota cost down — broaden the `if` below to review
# every PR. Managed "Code Review" (claude.ai admin settings) is Team/Enterprise
# only; this Actions path works on a Pro/Max subscription token.
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    # Only review the agent's implementation branches.
    if: startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read         # read the code under review
      pull-requests: write   # post review comments
      id-token: write        # subscription/OAuth (CLAUDE_CODE_OAUTH_TOKEN) exchange
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history for review context

      - name: Claude code review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          claude_args: "--model claude-sonnet-4-6"
          # Always leave a single, updated summary comment — even on a clean pass —
          # so automation waiting on the review has a deterministic signal to detect.
          use_sticky_comment: true
